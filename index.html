<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オトナの夜のIQテスト | ★オルガグローバル★Presents</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="オトナの夜のIQテスト | オルガグローバルPresents">
    <meta property="og:description" content="10問で分かる！あなたのオトナの夜の知識度は？">
    <meta property="og:image" content="https://zeroplus1234.github.io/night-iq/top-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="オトナの夜のIQテスト">
    <meta name="twitter:description" content="10問で分かる！あなたのオトナの夜の知識度は？">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main-bg: #0d0d0d; --neon-pink: #ff007f; --neon-blue: #00f2ff; --dark-gray: #1a1a1a; }
        body { font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background: var(--main-bg); color: #fff; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--dark-gray); padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); min-height: 300px; margin-bottom: 20px; }
        .top-banner { width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
        h1 { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); font-size: 22px; margin: 10px 0; }
        input { background: #333; border: 1px solid var(--neon-blue); color: #fff; padding: 12px; border-radius: 25px; width: 80%; text-align: center; margin-bottom: 20px; font-size: 16px; outline: none; }
        
        .btn { cursor: pointer; padding: 12px 24px; border-radius: 25px; font-weight: bold; transition: 0.3s; border: none; margin: 10px; display: inline-block; font-size: 16px; text-decoration: none; }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); width: 80%; }
        .btn-o { background: var(--neon-pink); color: #fff; width: 100px; font-size: 24px; }
        .btn-x { background: var(--neon-blue); color: #000; width: 100px; font-size: 24px; }
        .btn-next { background: #fff; color: #000; width: 80%; margin-top: 20px; }
        .btn-retry { background: #444; color: #fff; width: 80%; margin-top: 10px; font-size: 14px; }

        #quizArea, #feedbackArea, #resultArea { display: none; }
        .question-text { font-size: 18px; line-height: 1.6; margin: 20px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .judge-text { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .correct { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .incorrect { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        .explanation-text { font-size: 15px; line-height: 1.6; background: #2a2a2a; padding: 15px; border-radius: 10px; text-align: left; border-left: 4px solid var(--neon-blue); }
        
        /* キャプチャ用隠しエリア */
        #resultCaptureArea { position: absolute; left: -9999px; width: 800px; height: 800px; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; border: 15px solid var(--neon-pink); box-sizing: border-box; }
        .res-rank { font-size: 80px; font-weight: bold; color: var(--neon-pink); text-shadow: 0 0 30px var(--neon-pink); margin: 20px 0; }
        #generatedImage { max-width: 100%; border-radius: 10px; box-shadow: 0 0 20px var(--neon-pink); margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="startArea" class="card">
        <img src="top-image.jpg" class="top-banner" alt="メイン画像">
        <h1>オトナ♡の夜のIQテスト</h1>
        <p style="font-size: 14px; color: #ccc;">★オルガグローバル★Presents<br>10問で分かる！あなたのオトナ♡の夜の知識度は？</p>
        <input type="text" id="userName" placeholder="お名前を入力（ニックネーム可）" maxlength="15">
        <br>
        <button class="btn btn-start" onclick="startQuiz()">診断を開始する</button>
    </div>

    <div id="quizArea" class="card">
        <div id="qNum" style="color:#888; font-size: 14px;"></div>
        <div class="question-text" id="qText"></div>
        <div id="answerButtons">
            <button class="btn btn-o" onclick="checkAnswer(true)">〇</button>
            <button class="btn btn-x" onclick="checkAnswer(false)">×</button>
        </div>
    </div>

    <div id="feedbackArea" class="card">
        <div id="judge" class="judge-text"></div>
        <div class="explanation-text" id="exText"></div>
        <button class="btn btn-next" onclick="nextQuestion()">次へ進む</button>
    </div>

    <div id="resultArea" class="card">
        <h2>診断完了！</h2>
        <div id="loading" style="color: var(--neon-blue); margin: 20px 0;">結果画像を生成中...</div>
        <img id="generatedImage" alt="Result Image">
        <div id="resultActions" style="display:none;">
            <p style="font-size: 13px; color: #bbb; margin-top: 15px;">画像を長押し、または保存ボタンで保存して<br>X（旧Twitter）に添付してね！📸</p>
            <a id="downloadLink" class="btn btn-start" style="text-decoration:none;" download="night_iq_result.png">画像を保存する</a>
            <br>
            <a id="shareLink" class="btn" style="background:#fff; color:#000;" target="_blank">Xで結果を報告する</a>
            <br>
            <button class="btn btn-retry" onclick="resetQuiz()">もう一度挑戦する</button>
        </div>
    </div>
</div>

<div id="resultCaptureArea">
    <div style="font-size:30px; margin-bottom:10px;" id="capName"></div>
    <div style="font-size:40px; font-weight: bold; letter-spacing: 2px;">オトナ♡の夜のIQ診断結果</div>
    <div class="res-rank" id="capRank"></div>
    <div style="font-size:50px; color:var(--neon-blue); font-weight:bold; margin-bottom:20px;" id="capScore"></div>
    <div style="font-size:30px; width:80%; color:#ddd; line-height:1.5;" id="capDesc"></div>
    <div style="margin-top:50px; font-size:24px; color:#777;">#オトナの夜のIQ診断 @Orgaglobal</div>
</div>

<script>
    let currentQ = 0; 
    let score = 0; 
    let userName = "";

    const quizData = [
        { q: "「体臭がいい匂い」と感じる相手とは、本能（遺伝子）レベルでの相性がいいと言える。", a: true, ex: "〇：自分と異なる免疫タイプ（HLA遺伝子）を持つ相手の匂いを『快』と感じる仕組みがあり、生物学的に相性が良い証拠です。" },
        { q: "ラブホの自動精算機の音量が大きいのは、単に機械が古いからである。", a: false, ex: "×：廊下で他の客と鉢合わせないよう、周囲に「今、精算中ですよ」と知らせるためのプライバシーへの配慮です。" },
        { q: "「酔っちゃった」と言う相手に対し、即座に「お水飲む？」と返してあげるのは、夜のIQが高い。", a: false, ex: "×：正論は時にムードを壊します。相手が甘えたいのか、本当に体調が悪いのかを察する余裕こそが大人のIQです。" },
        { q: "コンドームを財布に入れて持ち歩くのは、夜のオトナのマナーである。", a: false, ex: "×：財布内の摩擦や体温でゴムが劣化し、破損の原因になります。専用のケースやポーチに入れましょう。" },
        { q: "「生理中なら絶対に妊娠しない」という説は、医学的に100%正しい。", a: false, ex: "×：精子の生存期間や排卵周期のズレにより、生理中でも妊娠の可能性はゼロではありません。避妊は常に必要です。" },
        { q: "セルフプレジャー(１人H)には、幸せホルモン分泌により肌をきれいにする効果がある。", a: true, ex: "〇：オキシトシンやドーパミンの分泌で血行が促進され、リラックス効果と共に美容への好影響が期待できます。" },
        { q: "デートの翌朝。相手からのLINEに、あえて数時間おいてから返信するほうが好感度が高い。", a: false, ex: "×：駆け引きより「誠実さ」が大事。楽しかった夜の後は、素直に感謝を伝えるのが最も心の距離を縮めます。" },
        { q: "寝る前のセルフプレジャー（１人H)は交感神経を刺激して、睡眠を妨げる原因になる。", a: false, ex: "×：むしろ副交感神経が優位になり、深い眠りに導くリラックス効果（入眠儀式）があると言われています。" },
        { q: "ローションは「濡れにくい時」だけ使う補完アイテムであり、潤っているなら使う必要はない。", a: false, ex: "×：摩擦ダメージを防ぐだけでなく、感度を調整し、より滑らかな触れ合いを楽しむための大人の嗜みです。" },
        { q: "研究によると、IQ（知能指数）が高い女性ほど、エロい傾向にある。", a: true, ex: "〇：知的好奇心の強さがセクシャリティへの探求心にも繋がり、より豊かな夜の時間を楽しめる傾向があるという説があります。" }
    ];

    function startQuiz() {
        userName = document.getElementById('userName').value.trim() || "ゲスト";
        document.getElementById('startArea').style.display = 'none';
        showQuestion();
    }

    function showQuestion() {
        document.getElementById('qNum').innerText = `第 ${currentQ + 1} 問 / 10`;
        document.getElementById('qText').innerText = quizData[currentQ].q;
        document.getElementById('quizArea').style.display = 'block';
        document.getElementById('feedbackArea').style.display = 'none';
    }

    function checkAnswer(userAns) {
        const isCorrect = (userAns === quizData[currentQ].a);
        if (isCorrect) { score++; }
        
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('feedbackArea').style.display = 'block';
        
        const judge = document.getElementById('judge');
        judge.innerText = isCorrect ? "正解！" : "不正解...";
        judge.className = "judge-text " + (isCorrect ? "correct" : "incorrect");
        document.getElementById('exText').innerText = quizData[currentQ].ex;
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

   function showResult() {
        document.getElementById('feedbackArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        let rank = ""; let desc = "";
        if (score === 10) {
            rank = "官能の雑学王";
            desc = "詳しすぎて引くレベルの夜の賢者。その圧倒的な知識があれば、どんな夜もスマートにリードできるはず！";
        }
        else if (score >= 8) {
            rank = "18禁エリート博士";
            desc = "かなりのエロ偏差値の持ち主。隅から隅まで知り尽くしたその知識で、余裕のある大人の振る舞いができるタイプです。";
        }
        else if (score >= 5) {
            rank = "健全なむっつりスケベ";
            desc = "知識は人並み、煩悩は人一倍。もっと本能の赴くままに経験値を積めば、さらに魅力的な大人になれるはず！";
        }
        else {
            rank = "奇跡の純白ピュアっ子";
            desc = "夜の知識はこれから。まずは大人のマナーを1から学んで、素敵な夜の社交術を身につけましょう！";
        }

        // キャプチャ用データ設定
        document.getElementById('capName').innerText = userName + " さんの";
        document.getElementById('capRank').innerText = rank;
        document.getElementById('capScore').innerText = score + " / 10点";
        document.getElementById('capDesc').innerText = desc;

        // 画像生成実行
        setTimeout(() => {
            const captureArea = document.getElementById('resultCaptureArea');
            html2canvas(captureArea, {
                backgroundColor: "#000",
                scale: 2 // 高画質化
            }).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                const resImg = document.getElementById('generatedImage');
                resImg.src = imgData;
                resImg.style.display = 'inline-block';
                document.getElementById('downloadLink').href = imgData;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultActions').style.display = 'block';
                
                const shareUrl = window.location.href.split('?')[0];
                const tweetText = encodeURIComponent(
                    `${userName}さんのオトナの夜のIQは【${score}/10点】ランク：${rank}でした！\n\n` +
                    `※下の画像を保存してポストに添付してね！📸\n\n` +
                    `▼今すぐ測定！\n${shareUrl}\n` +
                    `#オトナの夜のIQ診断 #オルガグローバル　@Orgaglobal`
                );
                document.getElementById('shareLink').href = `https://twitter.com/intent/tweet?text=${tweetText}`;
            });
        }, 800);
    }

    function resetQuiz() {
        currentQ = 0;
        score = 0;
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('startArea').style.display = 'block';
        document.getElementById('generatedImage').style.display = 'none';
        document.getElementById('resultActions').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
    }
</script>
</body>
</html>
